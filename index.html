<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Распознаватель AI</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.25);
    --glass-shadow: rgba(0,0,0,0.3);
    --accent: rgba(120,210,255,0.9);
    --accent2: rgba(180,120,255,0.9);
    --text: rgba(255,255,255,0.95);
    --text-dim: rgba(255,255,255,0.55);
    --blur: 24px;
    --radius: 28px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Inter',sans-serif; }

  #videoEl { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  #captureCanvas { display:none; }
  #capturedImg { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:0; display:none; filter:brightness(0.7) saturate(0.4); }
  #capturedImg.visible { display:block; }

  .ambient { position:fixed; inset:0; z-index:1; pointer-events:none; background:linear-gradient(180deg,rgba(0,0,0,0.38) 0%,transparent 28%,transparent 52%,rgba(0,0,0,0.6) 100%); }

  .glass { background:var(--glass-bg); backdrop-filter:blur(var(--blur)) saturate(180%); -webkit-backdrop-filter:blur(var(--blur)) saturate(180%); border:1px solid var(--glass-border); box-shadow:inset 0 1px 0 rgba(255,255,255,0.2),inset 0 -1px 0 rgba(255,255,255,0.05),0 8px 32px var(--glass-shadow); }

  #topBar { position:fixed; top:0; left:0; right:0; z-index:10; padding:env(safe-area-inset-top,12px) 16px 0; }
  #topBarInner { display:flex; align-items:center; justify-content:space-between; padding:13px 18px; border-radius:20px; margin-top:8px; }
  #appTitle { font-family:'Unbounded',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.02em; color:var(--text); }
  #appTitle span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  #langToggle { display:flex; align-items:center; gap:2px; padding:4px 5px; border-radius:13px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); }
  .lang-btn { padding:4px 10px; border-radius:9px; font-size:11px; font-weight:700; color:var(--text-dim); cursor:pointer; background:transparent; border:none; letter-spacing:0.06em; transition:all 0.2s; }
  .lang-btn.active { background:rgba(255,255,255,0.18); color:var(--text); }

  #crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-55%); z-index:5; pointer-events:none; transition:opacity 0.4s; }
  #crosshair.hidden { opacity:0; }
  .ch-ring { width:70px; height:70px; border:1.5px solid rgba(255,255,255,0.55); border-radius:50%; position:relative; animation:spin 8s linear infinite; }
  .ch-ring::before { content:''; position:absolute; width:1px; height:14px; background:rgba(255,255,255,0.45); top:-7px; left:50%; transform:translateX(-50%); }
  .ch-ring::after  { content:''; position:absolute; width:14px; height:1px; background:rgba(255,255,255,0.45); left:-7px; top:50%; transform:translateY(-50%); }
  .ch-c { position:absolute; width:13px; height:13px; border-color:var(--accent); border-style:solid; border-width:0; }
  .ch-c.tl{top:-19px;left:-19px;border-top-width:2px;border-left-width:2px;border-radius:3px 0 0 0}
  .ch-c.tr{top:-19px;right:-19px;border-top-width:2px;border-right-width:2px;border-radius:0 3px 0 0}
  .ch-c.bl{bottom:-19px;left:-19px;border-bottom-width:2px;border-left-width:2px;border-radius:0 0 0 3px}
  .ch-c.br{bottom:-19px;right:-19px;border-bottom-width:2px;border-right-width:2px;border-radius:0 0 3px 0}
  @keyframes spin { to{transform:rotate(360deg)} }

  #scanLine { position:fixed; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); box-shadow:0 0 12px var(--accent); z-index:6; opacity:0; top:30%; transition:opacity 0.3s; }
  #scanLine.scanning { opacity:1; animation:scan 1.4s ease-in-out infinite; }
  @keyframes scan { 0%{top:25%} 50%{top:75%} 100%{top:25%} }

  #particles { position:fixed; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
  .particle { position:absolute; border-radius:50%; background:rgba(120,210,255,0.4); animation:floatUp linear infinite; }
  @keyframes floatUp { from{transform:translateY(100vh) scale(0);opacity:0} 10%{opacity:1} 90%{opacity:1} to{transform:translateY(-80px) scale(1);opacity:0} }

  #bottomPanel { position:fixed; bottom:0; left:0; right:0; z-index:10; padding:0 14px calc(env(safe-area-inset-bottom,16px) + 14px); }
  #panelContent { padding:18px; border-radius:var(--radius); }
  #resultArea { display:none; margin-bottom:14px; }
  #resultArea.visible { display:block; }
  #resultLabel { font-size:10px; font-weight:700; letter-spacing:0.14em; color:var(--accent); text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  #resultLabel::before { content:''; display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
  #resultText { font-size:15px; line-height:1.6; color:var(--text); text-transform: capitalize; }
  #typingCursor { display:inline-block; width:2px; height:1em; background:var(--accent); margin-left:2px; vertical-align:text-bottom; animation:blink .7s step-end infinite; border-radius:1px; }
  @keyframes blink { 50%{opacity:0} }
  .divider { height:1px; background:linear-gradient(90deg,transparent,var(--glass-border),transparent); margin:14px 0; display:none; }
  .divider.visible { display:block; }

  #mainBtn { width:100%; padding:17px; border-radius:18px; border:none; cursor:pointer; font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.07em; color:#fff; position:relative; overflow:hidden; transition:transform 0.15s; outline:none; }
  #mainBtn.idle { background:linear-gradient(135deg,rgba(120,210,255,0.55),rgba(140,100,255,0.55)); box-shadow:inset 0 1px 0 rgba(255,255,255,0.3),0 6px 24px rgba(120,180,255,0.2); }
  #mainBtn.analyzing { background:linear-gradient(135deg,rgba(255,160,80,0.5),rgba(255,80,120,0.5)); pointer-events:none; }
  #mainBtn.again { background:linear-gradient(135deg,rgba(80,220,140,0.5),rgba(40,180,220,0.5)); box-shadow:inset 0 1px 0 rgba(255,255,255,0.3); }
  #mainBtn:active { transform:scale(0.97); }
  #mainBtn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-shine { position:absolute; top:0; left:-100%; width:55%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.13),transparent); animation:shine 3s ease infinite; }
  @keyframes shine { 0%{left:-100%} 30%{left:120%} 100%{left:120%} }
  .loading-dots { display:inline-flex; gap:4px; align-items:center; }
  .loading-dots span { width:5px; height:5px; border-radius:50%; background:currentColor; animation:dot 1.2s ease infinite; }
  .loading-dots span:nth-child(2){animation-delay:.2s}
  .loading-dots span:nth-child(3){animation-delay:.4s}
  @keyframes dot { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

  #noCam { position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:20; background:linear-gradient(135deg,#050510,#0d0820); flex-direction:column; gap:14px; padding:32px; text-align:center; }
  #noCam.visible { display:flex; }
  #noCam .icon { font-size:52px; opacity:.7; }
  #noCam p { color:var(--text-dim); font-size:14px; line-height:1.65; }
  #noCam strong { color:var(--text); display:block; font-size:17px; margin-bottom:5px; font-family:'Unbounded',sans-serif; font-weight:600; }
  #retryBtn { margin-top:6px; padding:13px 28px; border-radius:14px; border:1.5px solid rgba(120,210,255,0.4); background:rgba(120,210,255,0.1); color:var(--accent); font-family:'Unbounded',sans-serif; font-size:11px; font-weight:700; letter-spacing:.08em; cursor:pointer; }

  #errorToast { position:fixed; top:100px; left:14px; right:14px; z-index:30; padding:13px 16px; border-radius:16px; background:rgba(255,80,80,0.15); border:1px solid rgba(255,80,80,0.3); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); color:#ff9999; font-size:13px; line-height:1.5; transform:translateY(-16px); opacity:0; transition:all .3s; pointer-events:none; }
  #errorToast.show { transform:translateY(0); opacity:1; }
</style>
</head>
<body>

<video id="videoEl" autoplay playsinline muted style="display:none"></video>
<img id="capturedImg" alt="">
<canvas id="captureCanvas"></canvas>
<div class="ambient"></div>
<div id="particles"></div>

<div id="topBar">
  <div id="topBarInner" class="glass">
    <div id="appTitle">Распознаватель <span>AI</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="langToggle">
        <button class="lang-btn active" data-lang="ru" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </div>
</div>

<div id="crosshair">
  <div class="ch-ring">
    <div class="ch-c tl"></div><div class="ch-c tr"></div>
    <div class="ch-c bl"></div><div class="ch-c br"></div>
  </div>
</div>
<div id="scanLine"></div>

<div id="bottomPanel">
  <div id="panelContent" class="glass">
    <div id="resultArea">
      <div id="resultLabel">РЕЗУЛЬТАТ</div>
      <div id="resultText"></div>
    </div>
    <div id="divider" class="divider"></div>
    <button id="mainBtn" class="idle" onclick="handleBtn()" disabled>
      <div class="btn-shine"></div>
      <span id="btnText">ЗАГРУЗКА ИИ...</span>
    </button>
  </div>
</div>

<div id="noCam">
  <div class="icon">📷</div>
  <p><strong>Камера недоступна</strong>Разрешите доступ к камере в настройках браузера и обновите страницу.</p>
  <button id="retryBtn" onclick="initCamera()">Попробовать снова</button>
</div>
<div id="errorToast"></div>

<script>
let lang = 'ru';
let state = 'idle';
let net = null; // Переменная для нейросети

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  spawnParticles();
  initCamera();
  await loadModel();
});

async function loadModel() {
  try {
    // Загружаем MobileNet (локальная ML модель)
    net = await mobilenet.load();
    document.getElementById('mainBtn').disabled = false;
    updateBtnText();
  } catch(e) {
    showError("Ошибка загрузки нейросети. Проверьте интернет.");
  }
}

// ── LANG ─────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  document.getElementById('resultLabel').textContent = l === 'ru' ? 'РЕЗУЛЬТАТ' : 'RESULT';
  updateBtnText();
}

function updateBtnText() {
  if(!net) {
    document.getElementById('btnText').textContent = lang === 'ru' ? 'ЗАГРУЗКА ИИ...' : 'LOADING AI...';
    return;
  }
  if (state === 'idle') document.getElementById('btnText').textContent = lang === 'ru' ? 'РАСПОЗНАТЬ' : 'IDENTIFY';
  else if (state === 'result') document.getElementById('btnText').textContent = lang === 'ru' ? 'РАСПОЗНАТЬ ЕЩЁ' : 'IDENTIFY AGAIN';
}

// ── PARTICLES ────────────────────────────────────────────
function spawnParticles() {
  const c = document.getElementById('particles');
  for (let i=0;i<12;i++){
    const p=document.createElement('div'); p.className='particle';
    p.style.cssText=`left:${Math.random()*100}vw;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;animation-duration:${7+Math.random()*10}s;animation-delay:${Math.random()*9}s;opacity:${0.15+Math.random()*0.35}`;
    c.appendChild(p);
  }
}

// ── CAMERA ───────────────────────────────────────────────
async function initCamera() {
  document.getElementById('noCam').classList.remove('visible');
  try {
    const s = await navigator.mediaDevices.getUserMedia({ video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}, audio:false });
    const v = document.getElementById('videoEl'); v.srcObject=s; v.style.display='block';
  } catch(e) { document.getElementById('noCam').classList.add('visible'); }
}
function captureFrame() {
  const v=document.getElementById('videoEl'), c=document.getElementById('captureCanvas');
  c.width=v.videoWidth||640; c.height=v.videoHeight||480;
  c.getContext('2d').drawImage(v,0,0,c.width,c.height);
  return c.toDataURL('image/jpeg',0.85);
}
function showCaptured(url) { const i=document.getElementById('capturedImg'); i.src=url; i.classList.add('visible'); document.getElementById('videoEl').style.opacity='0'; }
function hideCaptured() { document.getElementById('capturedImg').classList.remove('visible'); document.getElementById('videoEl').style.opacity='1'; }

// ── TOAST ────────────────────────────────────────────────
function showError(msg) {
  const t=document.getElementById('errorToast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),5000);
}

// ── TYPEWRITER ───────────────────────────────────────────
function typewrite(text,el,speed=20) {
  el.innerHTML=''; const cur=document.createElement('span'); cur.id='typingCursor'; el.appendChild(cur); let i=0;
  const iv=setInterval(()=>{ el.insertBefore(document.createTextNode(text[i]),cur); if(++i>=text.length){clearInterval(iv);setTimeout(()=>cur.remove(),900);} },speed);
}

// ── TRANSLATION API (БЕСПЛАТНЫЙ) ─────────────────────────
async function translateText(text) {
  if (lang === 'en') return text;
  try {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ru`);
    const data = await res.json();
    return data.responseData.translatedText;
  } catch (e) {
    return text; // Если ошибка API, возвращаем оригинал
  }
}

// ── BUTTON LOGIC ─────────────────────────────────────────
function handleBtn() { if(state==='idle') doRecognize(); else if(state==='result') doReset(); }

async function doRecognize() {
  if(!net) return;
  state='analyzing';
  
  const v = document.getElementById('videoEl');
  const url = captureFrame(); 
  showCaptured(url);
  
  const btn=document.getElementById('mainBtn'), txt=document.getElementById('btnText');
  txt.innerHTML=lang==='ru'?'Анализирую <span class="loading-dots"><span></span><span></span><span></span></span>':'Analyzing <span class="loading-dots"><span></span><span></span><span></span></span>';
  btn.className='analyzing';
  
  document.getElementById('crosshair').classList.add('hidden');
  document.getElementById('scanLine').classList.add('scanning');
  
  try {
    // Распознаем объект с видео
    const result = await net.classify(v);
    
    // Берем самый вероятный вариант (результат на англ)
    let topResult = result[0].className.split(',')[0]; 
    let probability = Math.round(result[0].probability * 100);

    // Переводим если нужно
    let translated = await translateText(topResult);
    
    let finalText = lang === 'ru' 
      ? `Я вижу: ${translated} (уверенность: ${probability}%)`
      : `I see: ${translated} (confidence: ${probability}%)`;

    document.getElementById('scanLine').classList.remove('scanning');
    document.getElementById('resultArea').classList.add('visible');
    document.getElementById('divider').classList.add('visible');
    
    typewrite(finalText, document.getElementById('resultText'), 20);
    
    btn.className='again'; 
    state='result';
    updateBtnText();
    
  } catch(e) {
    document.getElementById('scanLine').classList.remove('scanning');
    showError(lang==='ru'?'Не удалось распознать':'Failed to identify'); 
    doReset();
  }
}

function doReset() {
  state='idle'; hideCaptured();
  document.getElementById('resultArea').classList.remove('visible');
  document.getElementById('divider').classList.remove('visible');
  document.getElementById('resultText').innerHTML='';
  document.getElementById('crosshair').classList.remove('hidden');
  document.getElementById('scanLine').classList.remove('scanning');
  document.getElementById('mainBtn').className='idle';
  updateBtnText();
}
</script>
</body>
</html>
