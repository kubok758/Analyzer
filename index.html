<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Распознаватель AI</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=Unbounded:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.25);
    --glass-shadow: rgba(0,0,0,0.3);
    --accent: rgba(120,210,255,0.9);
    --accent2: rgba(180,120,255,0.9);
    --text: rgba(255,255,255,0.95);
    --text-dim: rgba(255,255,255,0.55);
    --blur: 24px;
    --radius: 28px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Inter', sans-serif;
  }

  /* CAMERA LAYER */
  #videoEl {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    transition: filter 0.6s ease;
  }
  #videoEl.frozen { filter: brightness(0.7) saturate(0.4); }

  /* CANVAS (hidden, for capture) */
  #captureCanvas { display: none; }

  /* AMBIENT BLUR OVERLAY */
  .ambient {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.35) 0%,
      transparent 30%,
      transparent 55%,
      rgba(0,0,0,0.55) 100%
    );
    pointer-events: none;
  }

  /* LIQUID GLASS MIXIN */
  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(var(--blur)) saturate(180%);
    -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
    border: 1px solid var(--glass-border);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.2),
      inset 0 -1px 0 rgba(255,255,255,0.05),
      0 8px 32px var(--glass-shadow),
      0 2px 8px rgba(0,0,0,0.2);
  }

  /* TOP BAR */
  #topBar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: env(safe-area-inset-top, 12px) 20px 0;
  }
  #topBarInner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-radius: 22px;
    margin-top: 8px;
  }
  #appTitle {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
    line-height: 1;
  }
  #appTitle span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* LANG TOGGLE */
  #langToggle {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 5px 6px;
    border-radius: 14px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
  }
  .lang-btn {
    padding: 4px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    transition: all 0.25s ease;
    cursor: pointer;
    background: transparent;
    border: none;
    letter-spacing: 0.05em;
  }
  .lang-btn.active {
    background: rgba(255,255,255,0.18);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  /* CROSSHAIR */
  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #crosshair.hidden { opacity: 0; }
  .ch-ring {
    width: 72px; height: 72px;
    border: 1.5px solid rgba(255,255,255,0.6);
    border-radius: 50%;
    position: relative;
    animation: rotateSlow 8s linear infinite;
  }
  .ch-ring::before, .ch-ring::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.5);
  }
  .ch-ring::before { width: 1px; height: 16px; top: -8px; left: 50%; transform: translateX(-50%); }
  .ch-ring::after  { width: 16px; height: 1px; left: -8px; top: 50%; transform: translateY(-50%); }
  .ch-corner {
    position: absolute;
    width: 14px; height: 14px;
    border-color: var(--accent);
    border-style: solid;
    border-width: 0;
  }
  .ch-corner.tl { top: -20px; left: -20px; border-top-width: 2px; border-left-width: 2px; border-radius: 3px 0 0 0; }
  .ch-corner.tr { top: -20px; right: -20px; border-top-width: 2px; border-right-width: 2px; border-radius: 0 3px 0 0; }
  .ch-corner.bl { bottom: -20px; left: -20px; border-bottom-width: 2px; border-left-width: 2px; border-radius: 0 0 0 3px; }
  .ch-corner.br { bottom: -20px; right: -20px; border-bottom-width: 2px; border-right-width: 2px; border-radius: 0 0 3px 0; }
  @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* SCAN ANIMATION */
  #scanLine {
    position: fixed;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 12px var(--accent);
    z-index: 6;
    opacity: 0;
    top: 30%;
    transition: opacity 0.3s;
  }
  #scanLine.scanning {
    opacity: 1;
    animation: scanDown 1.4s ease-in-out infinite;
  }
  @keyframes scanDown {
    0%   { top: 25%; }
    50%  { top: 75%; }
    100% { top: 25%; }
  }

  /* BOTTOM PANEL */
  #bottomPanel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: 0 16px calc(env(safe-area-inset-bottom, 16px) + 16px);
  }
  #panelContent {
    padding: 20px;
    border-radius: var(--radius);
  }

  /* RESULT AREA */
  #resultArea {
    display: none;
    margin-bottom: 16px;
  }
  #resultArea.visible { display: block; }
  #resultLabel {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #resultLabel::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  #resultText {
    font-size: 16px;
    line-height: 1.55;
    color: var(--text);
    font-weight: 400;
    letter-spacing: 0.01em;
  }
  #typingCursor {
    display: inline-block;
    width: 2px; height: 1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.7s step-end infinite;
    border-radius: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
    margin: 14px 0;
    display: none;
  }
  .divider.visible { display: block; }

  /* MAIN BUTTON */
  #mainBtn {
    width: 100%;
    padding: 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: #fff;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.3s ease;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  #mainBtn.idle {
    background: linear-gradient(135deg, rgba(120,210,255,0.6) 0%, rgba(140,100,255,0.6) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.35),
      0 6px 24px rgba(120,180,255,0.25),
      0 2px 6px rgba(0,0,0,0.3);
  }
  #mainBtn.analyzing {
    background: linear-gradient(135deg, rgba(255,160,80,0.5) 0%, rgba(255,80,120,0.5) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.3),
      0 6px 24px rgba(255,140,80,0.2);
    pointer-events: none;
  }
  #mainBtn.again {
    background: linear-gradient(135deg, rgba(80,220,140,0.55) 0%, rgba(40,180,220,0.55) 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.3),
      0 6px 24px rgba(80,200,160,0.2);
  }
  #mainBtn:active { transform: scale(0.97); }
  #mainBtn .btn-shine {
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    skewX: -20deg;
    animation: shine 3s ease infinite;
  }
  @keyframes shine {
    0%   { left: -100%; }
    30%  { left: 120%; }
    100% { left: 120%; }
  }

  /* LOADING DOTS */
  .loading-dots { display: inline-flex; gap: 4px; align-items: center; }
  .loading-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    animation: dot 1.2s ease infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

  /* NO CAMERA */
  #noCam {
    position: fixed; inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: linear-gradient(135deg, #0a0a1a 0%, #0d0a20 100%);
    flex-direction: column;
    gap: 16px;
    padding: 32px;
    text-align: center;
  }
  #noCam.visible { display: flex; }
  #noCam .icon { font-size: 56px; opacity: 0.7; }
  #noCam p { color: var(--text-dim); font-size: 15px; line-height: 1.6; }
  #noCam strong { color: var(--text); display: block; font-size: 18px; margin-bottom: 6px; }
  #retryBtn {
    margin-top: 8px;
    padding: 14px 32px;
    border-radius: 16px;
    border: 1.5px solid rgba(120,210,255,0.4);
    background: rgba(120,210,255,0.1);
    color: var(--accent);
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
  }

  /* PARTICLES */
  #particles {
    position: fixed; inset: 0; z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(120,210,255,0.5);
    animation: float linear infinite;
  }
  @keyframes float {
    from { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    to   { transform: translateY(-100px) scale(1); opacity: 0; }
  }

  /* CAPTURED PREVIEW */
  #capturedImg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    display: none;
    filter: brightness(0.7) saturate(0.4);
  }
  #capturedImg.visible { display: block; }

  /* ERROR TOAST */
  #errorToast {
    position: fixed;
    top: 100px; left: 16px; right: 16px;
    z-index: 30;
    padding: 14px 18px;
    border-radius: 16px;
    background: rgba(255, 80, 80, 0.15);
    border: 1px solid rgba(255,80,80,0.3);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: #ff9999;
    font-size: 13px;
    line-height: 1.5;
    transform: translateY(-20px);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }
  #errorToast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<video id="videoEl" autoplay playsinline muted></video>
<img id="capturedImg" alt="captured">
<canvas id="captureCanvas"></canvas>

<div class="ambient"></div>
<div id="particles"></div>

<!-- TOP BAR -->
<div id="topBar">
  <div id="topBarInner" class="glass">
    <div id="appTitle">Распознаватель <span>AI</span></div>
    <div id="langToggle">
      <button class="lang-btn active" data-lang="ru" onclick="setLang('ru')">RU</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div>

<!-- CROSSHAIR -->
<div id="crosshair">
  <div class="ch-ring">
    <div class="ch-corner tl"></div>
    <div class="ch-corner tr"></div>
    <div class="ch-corner bl"></div>
    <div class="ch-corner br"></div>
  </div>
</div>

<!-- SCAN LINE -->
<div id="scanLine"></div>

<!-- BOTTOM PANEL -->
<div id="bottomPanel">
  <div id="panelContent" class="glass">
    <div id="resultArea">
      <div id="resultLabel">РЕЗУЛЬТАТ</div>
      <div id="resultText"></div>
    </div>
    <div id="divider" class="divider"></div>
    <button id="mainBtn" class="idle" onclick="handleBtn()">
      <div class="btn-shine"></div>
      <span id="btnText">РАСПОЗНАТЬ</span>
    </button>
  </div>
</div>

<!-- NO CAMERA -->
<div id="noCam">
  <div class="icon">📷</div>
  <p><strong>Камера недоступна</strong>Разрешите доступ к камере в настройках браузера и обновите страницу.</p>
  <button id="retryBtn" onclick="initCamera()">Попробовать снова</button>
</div>

<!-- ERROR TOAST -->
<div id="errorToast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────
let lang = 'ru';
let state = 'idle'; // idle | analyzing | result
let stream = null;

// ─── LANG ────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === l);
  });
  const resultLabel = document.getElementById('resultLabel');
  resultLabel.textContent = l === 'ru' ? 'РЕЗУЛЬТАТ' : 'RESULT';
  if (state === 'idle') {
    document.getElementById('btnText').textContent = l === 'ru' ? 'РАСПОЗНАТЬ' : 'IDENTIFY';
  } else if (state === 'result') {
    document.getElementById('btnText').textContent = l === 'ru' ? 'РАСПОЗНАТЬ ЕЩЁ' : 'IDENTIFY AGAIN';
  }
}

// ─── PARTICLES ───────────────────────────────────────────
function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
    p.style.opacity = (0.2 + Math.random() * 0.4).toString();
    container.appendChild(p);
  }
}

// ─── CAMERA ──────────────────────────────────────────────
async function initCamera() {
  document.getElementById('noCam').classList.remove('visible');
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    const video = document.getElementById('videoEl');
    video.srcObject = stream;
    video.style.display = 'block';
  } catch (e) {
    document.getElementById('noCam').classList.add('visible');
  }
}

// ─── CAPTURE FRAME ───────────────────────────────────────
function captureFrame() {
  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('captureCanvas');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.85);
}

// ─── SHOW CAPTURED ───────────────────────────────────────
function showCaptured(dataUrl) {
  const img = document.getElementById('capturedImg');
  img.src = dataUrl;
  img.classList.add('visible');
  document.getElementById('videoEl').style.opacity = '0';
}
function hideCaptured() {
  document.getElementById('capturedImg').classList.remove('visible');
  document.getElementById('videoEl').style.opacity = '1';
}

// ─── ERROR TOAST ─────────────────────────────────────────
function showError(msg) {
  const t = document.getElementById('errorToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// ─── TYPEWRITER ──────────────────────────────────────────
function typewrite(text, el, speed = 18) {
  el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.id = 'typingCursor';
  el.appendChild(cursor);
  let i = 0;
  const interval = setInterval(() => {
    el.insertBefore(document.createTextNode(text[i]), cursor);
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      setTimeout(() => cursor.remove(), 800);
    }
  }, speed);
}

// ─── CLAUDE API ──────────────────────────────────────────
async function analyzeImage(base64Data) {
  const base64 = base64Data.split(',')[1];

  const systemPrompt = lang === 'ru'
    ? 'Ты — мобильный AI-распознаватель объектов. Пользователь сфотографировал что-то камерой телефона. Опиши кратко и точно, что именно изображено на фото. Отвечай по-русски, живо и естественно. Начни сразу с описания объекта, без вводных слов. 1-4 предложения.'
    : 'You are a mobile AI object recognizer. The user photographed something with their phone camera. Briefly and accurately describe what is shown in the photo. Reply in English, naturally and concisely. Start directly with the object description, no preamble. 1-4 sentences.';

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{
        role: 'user',
        content: [{
          type: 'image',
          source: { type: 'base64', media_type: 'image/jpeg', data: base64 }
        }, {
          type: 'text',
          text: lang === 'ru' ? 'Что на этом фото?' : 'What is in this photo?'
        }]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  return data.content.map(b => b.text || '').join('').trim();
}

// ─── BUTTON HANDLER ──────────────────────────────────────
async function handleBtn() {
  if (state === 'idle') {
    await doRecognize();
  } else if (state === 'result') {
    doReset();
  }
}

async function doRecognize() {
  state = 'analyzing';

  // Capture
  const dataUrl = captureFrame();
  showCaptured(dataUrl);

  // UI: analyzing
  const btn = document.getElementById('mainBtn');
  const btnText = document.getElementById('btnText');
  btn.className = 'analyzing';
  btnText.innerHTML = lang === 'ru'
    ? 'Анализирую <span class="loading-dots"><span></span><span></span><span></span></span>'
    : 'Analyzing <span class="loading-dots"><span></span><span></span><span></span></span>';

  document.getElementById('crosshair').classList.add('hidden');
  document.getElementById('scanLine').classList.add('scanning');

  try {
    const result = await analyzeImage(dataUrl);

    // UI: result
    document.getElementById('scanLine').classList.remove('scanning');
    document.getElementById('resultArea').classList.add('visible');
    document.getElementById('divider').classList.add('visible');
    document.getElementById('resultLabel').textContent = lang === 'ru' ? 'РЕЗУЛЬТАТ' : 'RESULT';

    const resultEl = document.getElementById('resultText');
    typewrite(result, resultEl, 22);

    btn.className = 'again';
    btnText.textContent = lang === 'ru' ? 'РАСПОЗНАТЬ ЕЩЁ' : 'IDENTIFY AGAIN';
    state = 'result';

  } catch (e) {
    document.getElementById('scanLine').classList.remove('scanning');
    showError(lang === 'ru'
      ? 'Ошибка анализа: ' + e.message
      : 'Analysis error: ' + e.message);
    doReset();
  }
}

function doReset() {
  state = 'idle';
  hideCaptured();

  document.getElementById('resultArea').classList.remove('visible');
  document.getElementById('divider').classList.remove('visible');
  document.getElementById('resultText').innerHTML = '';
  document.getElementById('crosshair').classList.remove('hidden');
  document.getElementById('scanLine').classList.remove('scanning');

  const btn = document.getElementById('mainBtn');
  btn.className = 'idle';
  document.getElementById('btnText').textContent = lang === 'ru' ? 'РАСПОЗНАТЬ' : 'IDENTIFY';
}

// ─── INIT ─────────────────────────────────────────────────
spawnParticles();
initCamera();
</script>
</body>
</html>
